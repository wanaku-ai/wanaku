name: Deploy Wanaku Dev

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Main"]
    types:
      - completed

env:
  PROJECTS: ${{ github.workspace }}

jobs:
  build:
    if: github.repository == 'wanaku-ai/wanaku'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install CLI tools from Mirror
      uses: redhat-actions/openshift-tools-installer@v1
      with:
        source: "mirror"
        oc: "latest"
    - name: Authenticate and set context
      uses: redhat-actions/oc-login@v1
      with:
        openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
        openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
        insecure_skip_tls_verify: true
        namespace: ${{ secrets.OPENSHIFT_NAMESPACE }}
    - name: Uninstall previous operator release
      run: helm uninstall wanaku-operator --namespace ${{ secrets.OPENSHIFT_NAMESPACE }} --ignore-not-found
    - name: Install the operator
      run: helm install wanaku-operator apps/wanaku-operator/deploy/helm/wanaku-operator --namespace ${{ secrets.OPENSHIFT_NAMESPACE }} --set operatorNamespace=${{ secrets.OPENSHIFT_NAMESPACE }}
    - name: Deploy the router
      run: sed -e "s/oidc-url-replace/${{ secrets.QUARKUS_OIDC_CLIENT_AUTH_SERVER}}/g" -e "s/replace-me-with-the-client-credentials-secret/${{ secrets.QUARKUS_OIDC_CLIENT_CREDENTIALS_SECRET}}/g" deploy/openshift/wanaku-router.yaml | oc apply -f -
    - name: Deploy the capabilities
      run: sed -e "s/oidc-url-replace/${{ secrets.QUARKUS_OIDC_CLIENT_AUTH_SERVER}}/g" -e "s/replace-me-with-the-client-credentials-secret/${{ secrets.QUARKUS_OIDC_CLIENT_CREDENTIALS_SECRET}}/g" deploy/openshift/wanaku-capabilities.yaml | oc apply -f -
