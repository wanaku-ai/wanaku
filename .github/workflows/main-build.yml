# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build Main

on:
  workflow_dispatch:
  push:
    branches:
        - main
        - release-prep
        - ci-**
        - '[0-9]*.[0-9]*.x'
    tags:
      - wanaku-*
    paths-ignore:
      - .github/**
      - docs/**
      - artwork/**
      - README.md
      - docker-*
      - index.md
      - jbang-catalog.json
      - Makefile
      - LICENSE
      - CLAUDE.md
      - CONTRIBUTING.md
      - jreleaser.yml
      - glama.json
      - SECURITY.md
      - get-wanaku.sh
      - javadoc-warm.sh
      - .*

# Least-privilege default for the automatically-provided GITHUB_TOKEN. Jobs that need more
# (e.g. publishing) should opt in with a narrower job-level permissions block.
permissions:
  contents: read

env:
  PROJECTS: ${{ github.workspace }}
  CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY || 'quay.io' }}
  CONTAINER_GROUP: ${{ vars.CONTAINER_GROUP || 'wanaku' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    env:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Determine SDK ref
      id: sdk-ref
      run: |
        BRANCH="${GITHUB_REF_NAME}"
        if git ls-remote --heads https://github.com/wanaku-ai/wanaku-capabilities-java-sdk.git "$BRANCH" | grep -q .; then
          echo "ref=$BRANCH" >> $GITHUB_OUTPUT
        else
          echo "ref=main" >> $GITHUB_OUTPUT
        fi
    - name: Checkout Wanaku Capabilities SDK
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        repository: wanaku-ai/wanaku-capabilities-java-sdk
        persist-credentials: false
        ref: ${{ steps.sdk-ref.outputs.ref }}
        path: wanaku-capabilities-java-sdk
    - name: Build Wanaku Capabilities SDK
      run: mvn --no-transfer-progress -DskipTests clean install
      working-directory: ${{ github.workspace }}/wanaku-capabilities-java-sdk
    - name: Set arch
      id: arch
      run: echo "arch=$(uname -m)" >> $GITHUB_OUTPUT
    - name: Login to Container Registry
      if: env.QUAY_USERNAME != '' && env.QUAY_PASSWORD != ''
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}
    - name: Build and Publish (x86)
      if: matrix.os == 'ubuntu-latest' && env.QUAY_USERNAME != '' && env.QUAY_PASSWORD != ''
      run: |
        mvn -B --no-transfer-progress clean package \
          -Dquarkus.container-image.build=true \
          -Dquarkus.container-image.push=true \
          -Dquarkus.container-image.group=${{ env.CONTAINER_GROUP }} \
          -Dquarkus.container-image.tag=${{ github.ref_name }}-${{ steps.arch.outputs.arch }} \
          -Dquarkus.jib.platforms=linux/amd64 \
          -Pdist
    - name: Build and Publish (arm)
      if: matrix.os == 'ubuntu-24.04-arm' && env.QUAY_USERNAME != '' && env.QUAY_PASSWORD != ''
      run: |
        mvn -B --no-transfer-progress clean package \
          -Dquarkus.container-image.build=true \
          -Dquarkus.container-image.push=true \
          -Dquarkus.container-image.group=${{ env.CONTAINER_GROUP }} \
          -Dquarkus.container-image.tag=${{ github.ref_name }}-${{ steps.arch.outputs.arch }} \
          -Dquarkus.jib.platforms=linux/arm64/v8 \
          -Pdist
    - name: Generate Test Reports
      if: always()
      run: mvn -B --no-transfer-progress surefire-report:report-only surefire-report:failsafe-report-only -Daggregate=true
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: test-reports-${{ matrix.os }}
        path: 'target/reports/'
        retention-days: 14
        if-no-files-found: ignore


  createManifests:
    needs: build
    runs-on: ubuntu-latest
    env:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Login to Container Registry
        if: env.QUAY_USERNAME != '' && env.QUAY_PASSWORD != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Create and push multi-arch manifests
        if: env.QUAY_USERNAME != '' && env.QUAY_PASSWORD != ''
        run: |
          ./build-manifests.sh ${{ github.ref_name }} ${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_GROUP }}
