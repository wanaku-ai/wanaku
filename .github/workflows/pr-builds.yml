# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Multiplatform PR Builds

on:
  pull_request:
    branches:
      - "main"
      - '[0-9]*.[0-9]*.x'
    paths-ignore:
      - .github/**
      - docs/**
      - artwork/**
      - README.md
      - docker-*
      - index.md
      - jbang-catalog.json
      - Makefile
      - LICENSE
      - CLAUDE.md
      - CONTRIBUTING.md
      - jreleaser.yml
      - glama.json
      - SECURITY.md
      - .*

env:
  PROJECTS: ${{ github.workspace }}

jobs:
  build:

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        experimental: [false]
        include:
          - os: windows-latest
            experimental: true
      fail-fast: true

    steps:
    - name: Determine SDK ref
      id: sdk-ref
      shell: bash
      run: |
        BRANCH="${{ github.base_ref }}"
        if git ls-remote --heads https://github.com/wanaku-ai/wanaku-capabilities-java-sdk.git "$BRANCH" | grep -q .; then
          echo "ref=$BRANCH" >> $GITHUB_OUTPUT
        else
          echo "ref=main" >> $GITHUB_OUTPUT
        fi
    - name: Checkout Wanaku Capabilities SDK
      uses: actions/checkout@v6
      with:
        repository: wanaku-ai/wanaku-capabilities-java-sdk
        persist-credentials: false
        ref: ${{ steps.sdk-ref.outputs.ref }}
        path: wanaku-capabilities-java-sdk
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build Wanaku Capabilities SDK
      run: mvn --no-transfer-progress -DskipTests clean install
      working-directory: ${{ github.workspace }}/wanaku-capabilities-java-sdk
    - uses: actions/checkout@v6
    - name: Build with Maven
      run: mvn -B --no-transfer-progress install --file pom.xml
    - name: Generate Test Reports
      if: always()
      run: mvn -B --no-transfer-progress surefire-report:report-only surefire-report:failsafe-report-only -Daggregate=true
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports-${{ matrix.os }}
        path: 'target/reports/'
        retention-days: 14
        if-no-files-found: ignore
    - name: Test Archetypes
      if: runner.os != 'Windows'
      run: bash tests/archetype-tests/test-archetypes.sh
