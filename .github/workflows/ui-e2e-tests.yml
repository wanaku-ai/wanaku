name: UI E2E Tests

on:
  pull_request:
    branches:
      - "main"
      - '[0-9]*.[0-9]*.x'
    paths-ignore:
      - .github/**
      - docs/**
      - artwork/**
      - README.md
      - docker-*
      - index.md
      - jbang-catalog.json
      - Makefile
      - LICENSE
      - CLAUDE.md
      - CONTRIBUTING.md
      - jreleaser.yml
      - glama.json
      - SECURITY.md
      - get-wanaku.sh
      - javadoc-warm.sh
      - tests/plans/**
      - .*
  push:
    branches:
      - main
      - ci-*
      - '[0-9]*.[0-9]*.x'
    paths-ignore:
      - .github/**
      - docs/**
      - artwork/**
      - README.md
      - docker-*
      - index.md
      - jbang-catalog.json
      - Makefile
      - LICENSE
      - CLAUDE.md
      - CONTRIBUTING.md
      - jreleaser.yml
      - glama.json
      - SECURITY.md
      - get-wanaku.sh
      - javadoc-warm.sh
      - tests/plans/**
      - .*

permissions:
  contents: read

env:
  PROJECTS: ${{ github.workspace }}

jobs:
  ui-e2e:
    runs-on: ubuntu-latest

    steps:
    - name: Determine SDK ref
      id: sdk-ref
      shell: bash
      run: |
        BRANCH="${{ github.base_ref || github.ref_name }}"
        if git ls-remote --heads https://github.com/wanaku-ai/wanaku-capabilities-java-sdk.git "$BRANCH" | grep -q .; then
          echo "ref=$BRANCH" >> $GITHUB_OUTPUT
        else
          echo "ref=main" >> $GITHUB_OUTPUT
        fi

    - name: Checkout Wanaku Capabilities SDK
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        repository: wanaku-ai/wanaku-capabilities-java-sdk
        persist-credentials: false
        ref: ${{ steps.sdk-ref.outputs.ref }}
        path: wanaku-capabilities-java-sdk

    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Wanaku Capabilities SDK
      run: mvn --no-transfer-progress -DskipTests clean install
      working-directory: ${{ github.workspace }}/wanaku-capabilities-java-sdk

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Build Router Backend
      run: mvn -B --no-transfer-progress package -pl apps/wanaku-router-backend -am -DskipTests

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 'lts/*'
        cache: 'yarn'
        cache-dependency-path: tests/e2e/ui/yarn.lock

    - name: Install Playwright dependencies
      working-directory: tests/e2e/ui
      run: |
        yarn install --frozen-lockfile
        npx playwright install --with-deps chromium

    - name: Start Router Backend
      run: |
        WANAKU_HTTP_AUTH=none java -jar apps/wanaku-router-backend/target/quarkus-app/quarkus-run.jar &
        echo "Waiting for backend to be ready..."
        for i in $(seq 1 60); do
          if curl -sf http://localhost:8080/q/health/ready > /dev/null 2>&1; then
            echo "Backend ready after ${i}s"
            break
          fi
          if [ "$i" -eq 60 ]; then
            echo "Backend failed to start within 60s"
            exit 1
          fi
          sleep 1
        done

    - name: Run Playwright Tests
      working-directory: tests/e2e/ui
      run: npx playwright test

    - name: Upload Playwright Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: playwright-report
        path: |
          tests/e2e/ui/playwright-report/
          tests/e2e/ui/test-results/
        retention-days: 14
        if-no-files-found: ignore
