# =============================================================================
# WARNING: development / evaluation use only — DO NOT use this file in production.
# It ships well-known, insecure default credentials:
#   - Keycloak admin:    admin / admin
#   - OIDC client secret for "wanaku-service": defaults to "mypasswd" (override WANAKU_SERVICE_SECRET)
# Before any non-local deployment you MUST rotate the Keycloak admin password and set a strong
# WANAKU_SERVICE_SECRET environment variable. When set, it is applied to both the Keycloak realm
# import and the capability services below; it defaults to "mypasswd" for local development only.
# =============================================================================
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    command: [ "--config=/etc/otelcol/config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  jaeger:
    image: jaegertracing/jaeger:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: [ "start-dev", "--import-realm" ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
      # Substituted into the wanaku-service client secret during realm import.
      WANAKU_SERVICE_SECRET: ${WANAKU_SERVICE_SECRET:-mypasswd}
    ports:
      - "8543:8080"
    volumes:
      - ../auth/wanaku-config.json:/opt/keycloak/data/import/realm-export.json:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s

  wanaku-tool-service-http:
    image: quay.io/wanaku/wanaku-tool-service-http:latest
    environment:
      WANAKU_SERVICE_REGISTRATION_URI: http://localhost:8080/
      AUTH_SERVER: http://localhost:8543
      # Must match the wanaku-service client secret in the realm (WANAKU_SERVICE_SECRET).
      QUARKUS_OIDC_CLIENT_CREDENTIALS_SECRET: ${WANAKU_SERVICE_SECRET:-mypasswd}      
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
    network_mode: host
    depends_on:
      wanaku-router:
        condition: service_started
      keycloak:
        condition: service_healthy
    volumes:
      - wanaku-services:/home/jboss/.wanaku/services

  wanaku-router:
    image: quay.io/wanaku/wanaku-router-backend:latest
    environment:
      QUARKUS_MCP_SERVER_TRAFFIC_LOGGING_ENABLED: "true"
      QUARKUS_HTTP_HOST: 0.0.0.0
      AUTH_SERVER: http://localhost:8543
      AUTH_PROXY: http://localhost:8080
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
    depends_on:
      keycloak:
        condition: service_healthy
    network_mode: host
    volumes:
      - wanaku-router:/home/jboss/.wanaku/router
  healthcheck:
    test: curl -f localhost:8080/q/health/ready || exit 1
    interval: 10s
    timeout: 10s
    retries: 5
    start_period: 30s

volumes:
  wanaku-router:
  wanaku-services:
