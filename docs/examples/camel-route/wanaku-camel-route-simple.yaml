apiVersion: wanaku.ai/v1alpha1
kind: WanakuCamelRoute
metadata:
  name: tavily-search
spec:
  routerRef: my-router
  route:
    - route:
        id: tavily-search
        from:
          uri: direct:wanaku
          steps:
            - setHeader:
                name: CamelHttpMethod
                expression:
                  constant:
                    expression: POST
            - setHeader:
                name: Content-Type
                expression:
                  constant:
                    expression: application/json
            - setBody:
                expression:
                  simple:
                    expression: '{"api_key": "{{tavily.api.key}}", "query": "${body}"}'
            - to:
                uri: https://api.tavily.com/search
  mcp:
    tools:
      - name: tavily-search
        routeId: tavily-search
        description: Search the web using the Tavily AI-optimized search engine
        properties:
          - name: wanaku_body
            type: string
            description: The search term
            required: true
  properties:
    tavily.api.key: "{{tavily.api.key}}"
