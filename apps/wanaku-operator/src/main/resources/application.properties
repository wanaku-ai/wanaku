# Wanaku Operator Configuration

# HTTP Configuration
quarkus.http.port=8081
quarkus.devservices.enabled=false

# Logging Configuration
quarkus.log.console.enable=true
quarkus.log.console.level=INFO
quarkus.log.category."ai.wanaku".level=DEBUG

quarkus.operator-sdk.crd.apply=true

# Helm Configuration
# Generate namespace field in ClusterRoleBinding subjects (required for Helm)
quarkus.kubernetes.rbac.service-accounts.wanaku-operator.namespace=placeholder
# Replace the placeholder namespace with the Helm release namespace expression
quarkus.helm.expressions.0.path=(kind == ClusterRoleBinding).subjects.namespace
quarkus.helm.expressions.0.expression={{ .Release.Namespace }}
