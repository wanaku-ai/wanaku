quarkus.arc.ignored-split-packages=org.infinispan.commons.jdkspecific
quarkus.native.resources.includes=service-templates/**
quarkus.package.jar.type=mutable-jar
quarkus.banner.enabled=false
quarkus.devservices.enabled=false
quarkus.console.enabled=false
quarkus.http.port=8080
quarkus.grpc.server.use-separate-server=false

# Optional local overrides for dev profile (not committed)
#%dev.quarkus.config.locations=file:./application.dev.properties

# Health check configuration
wanaku.router.health-check.enabled=true
wanaku.router.health-check.interval-seconds=60
wanaku.router.health-check.max-concurrent=10

wanaku.bridge.grpc.transport.deadline-seconds=10
# Secure the internal router<->capability gRPC transport with TLS. Default false (plaintext) is
# appropriate only when the router and capabilities share a trusted in-cluster/localhost network;
# set to true (against TLS-enabled capability endpoints) when traffic crosses untrusted segments.
wanaku.bridge.grpc.transport.tls.enabled=false

# Wanaku home directory (can be overridden via system property wanaku.home or env var WANAKU_HOME)
wanaku.home=${user.home}/.wanaku

# Chat LLM proxy allowlist
wanaku.chat.allowlist=Ollama,OpenAi,Mistral,Gemini,Anthropic

# Wanaku internal NS
quarkus.mcp.server.wanaku-internal.sse.root-path=/wanaku-internal/mcp

# Namespaces must be set in build time
quarkus.mcp.server.ns-0.sse.root-path=/ns-0/mcp
quarkus.mcp.server.ns-1.sse.root-path=/ns-1/mcp
quarkus.mcp.server.ns-2.sse.root-path=/ns-2/mcp
quarkus.mcp.server.ns-3.sse.root-path=/ns-3/mcp
quarkus.mcp.server.ns-4.sse.root-path=/ns-4/mcp
quarkus.mcp.server.ns-5.sse.root-path=/ns-5/mcp
quarkus.mcp.server.ns-6.sse.root-path=/ns-6/mcp
quarkus.mcp.server.ns-7.sse.root-path=/ns-7/mcp
quarkus.mcp.server.ns-8.sse.root-path=/ns-8/mcp
quarkus.mcp.server.ns-9.sse.root-path=/ns-9/mcp

# Public NS
quarkus.mcp.server.public.sse.root-path=/public/mcp

# Workaround: Vert.x StaticHandler omits Content-Type on HEAD responses (#1473)
quarkus.http.header."Content-Type".value=text/html;charset=UTF-8
quarkus.http.header."Content-Type".path=/admin(/index\\.html)?/?
quarkus.http.header."Content-Type".methods=HEAD

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://localhost:6274
quarkus.http.cors.exposed-headers=Mcp-Session-Id

%dev.quarkus.mcp.server.traffic-logging.enabled=true
%dev.quarkus.mcp.server.traffic-logging.text-limit=1000000
quarkus.mcp.server.server-info.name=Wanaku
quarkus.mcp.server.client-logging.default-level=debug

# Auth configuration: "keycloak" (default) enables OIDC, "none" disables authentication
wanaku.http.auth=keycloak

# Auth
quarkus.oidc.enabled=true

# Keycloak Authorization (disabled by default, enable to enforce resource-based policies)
quarkus.keycloak.policy-enforcer.enabled=false

# Address of the Keycloak authentication server - adjust to your Keycloak instance
auth.server=${AUTH_SERVER:http://localhost:8543}
# Address used by the OIDC proxy -
auth.proxy=http://localhost:${quarkus.http.port}
# Keycloak realm name - adjust to your Keycloak realm
auth.realm=${AUTH_REALM:wanaku}

# Address of the Keycloak authentication server
quarkus.oidc.auth-server-url=${auth.server}/realms/${auth.realm}

# Client identifier configured in Keycloak for the backend service
quarkus.oidc.client-id=wanaku-mcp-router

# Wanaku uses hybrid, as it is both a web application and a service
quarkus.oidc.application-type=hybrid
%dev.quarkus.oidc.tls.verification=none
# URL path where users can log out from the application (don't change)
quarkus.oidc.logout.path=/logout
quarkus.oidc.discovery-enabled=true
quarkus.oidc.authentication.pkce-required=true
quarkus.oidc.connection-delay=60S
quarkus.oidc.resource-metadata.enabled=true

# This helps the metadata handler be aware that we are using the OIDC proxy (don't change)
quarkus.oidc.resource-metadata.authorization-server=${auth.proxy}/q/oidc

# Avoid forcing HTTPS
quarkus.oidc.resource-metadata.force-https-scheme=false

# These configure the special rules for the restricted MCP namespaces
quarkus.oidc.mcp.resource-metadata.authorization-server=${auth.proxy}/q/oidc
quarkus.oidc.mcp.auth-server-url=${auth.server}/realms/${auth.realm}
quarkus.oidc.mcp.tenant-paths=/mcp/*
quarkus.oidc.mcp.token.audience=wanaku-mcp-client
quarkus.oidc.mcp.resource-metadata.enabled=true
quarkus.oidc.mcp.resource-metadata.resource=mcp
quarkus.oidc.mcp.resource-metadata.force-https-scheme=false
quarkus.oidc.mcp.connection-delay=60S

# Per-namespace OIDC tenant configurations (ns-0 through ns-9) are resolved
# dynamically by NamespaceTenantConfigResolver to avoid sequential startup
# discovery delays and OidcProxy NPE when the OIDC server is slow.

quarkus.oidc-proxy.enabled=true
quarkus.oidc-proxy.root-path=/q/oidc
# Make sure to use the configurations for the MCP tenant instead of the default ones
quarkus.oidc-proxy.tenant-id=mcp

# Paths used by the OIDC Proxy, which need to be public
quarkus.http.auth.permission.oidcproxy.paths=/.well-known/oauth-protected-resource/*, /.well-known/oauth-authorization-server/*, /q/oidc/*
quarkus.http.auth.permission.oidcproxy.policy=permit

# Health check paths must be publicly accessible for K8s probes
quarkus.http.auth.permission.health.paths=/q/health/*
quarkus.http.auth.permission.health.policy=permit

# Default-deny: ALL REST APIs require authentication. /api/v1/* and /api/v2/* carry a more specific
# path prefix than the catch-all public rule below, so Quarkus' longest-prefix-wins matching gives
# them priority over it. Only genuinely public paths (static UI, the public MCP namespace, health
# and the OIDC discovery metadata) remain permitted. NOTE: under the default keycloak profile the
# CLI must run `wanaku login` before it can call these endpoints. In "none" auth mode
# AuthConfigSource downgrades this policy to "permit" (see AuthConfigSource).
quarkus.http.auth.permission.authenticated.paths=/api/v1/*, /api/v2/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Restricted MCP namespaces
quarkus.http.auth.permission.mcp-authenticated.paths=/mcp/*, /ns-0/*, /ns-1/*, /ns-2/*, /ns-3/*, /ns-4/*, /ns-5/*, /ns-6/*, /ns-7/*, /ns-8/*, /ns-9/*
quarkus.http.auth.permission.mcp-authenticated.policy=authenticated

# Public: the admin UI static assets (SPA shell + Vite assets), the public MCP namespace
# (/public/mcp) and the catch-all for other non-API resources. The sensitive REST APIs are covered
# by the more-specific authenticated rule above, which therefore takes priority.
quarkus.http.auth.permission.public.paths=/index.html, /*
quarkus.http.auth.permission.public.policy=permit

## Admin UI, which requires authentication for all paths in the web interface
quarkus.http.auth.permission.web.paths=/admin/*, /admin
quarkus.http.auth.permission.web.policy=authenticated

# Logging configuration

# OpenTelemetry configuration - disabled by default
# Enable with -Dquarkus.otel.sdk.disabled=false and -Dquarkus.otel.exporter.otlp.endpoint=<endpoint>
quarkus.otel.sdk.disabled=true
%docker-compose.quarkus.otel.sdk.disabled=false
%docker-compose.quarkus.otel.exporter.otlp.endpoint=http://otel-collector:4317
quarkus.otel.exporter.otlp.traces.protocol=grpc
quarkus.otel.resource.attributes=service.name=wanaku-router,service.version=${quarkus.application.version}
quarkus.otel.traces.sampler=parentbased_always_on
quarkus.otel.propagators=tracecontext,baggage

# Enable MCP server tracing (OTEL SDK must be enabled for spans to be emitted)
quarkus.mcp.server.tracing.enabled=true

# Enable MDC injection for trace correlation in logs
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c] (%t) [traceId=%X{traceId}, requestId=%X{requestId}] %s%e%n

quarkus.http.access-log.enabled=true
quarkus.log.level=INFO
quarkus.log.category."ai.wanaku".level=INFO
quarkus.log.category."io.quarkus.oidc.proxy".level=INFO
quarkus.log.category."io.quarkiverse.mcp".level=INFO

%dev.quarkus.log.console.enabled=false

%dev.quarkus.log.handler.file.wanaku-log.enabled=true
%dev.quarkus.log.handler.file.wanaku-log.path=target/logs/wanaku.log
%dev.quarkus.log.handler.file.wanaku-log.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c] (%t) [traceId=%X{traceId}, requestId=%X{requestId}] %s%e%n
%dev.quarkus.log.category."ai.wanaku".handlers=wanaku-log
%dev.quarkus.log.category."ai.wanaku".level=DEBUG
%dev.quarkus.log.category."io.quarkus".handlers=wanaku-log
%dev.quarkus.log.category."io.quarkus".level=INFO
%dev.quarkus.log.category."org.apache.http".handlers=wanaku-log
%dev.quarkus.log.category."org.apache.http".level=INFO
%dev.quarkus.log.category."io.quarkus.oidc.proxy".handlers=wanaku-log
%dev.quarkus.log.category."io.quarkus.oidc.proxy".level=DEBUG
%dev.quarkus.log.category."io.quarkiverse.mcp".handlers=wanaku-log
%dev.quarkus.log.category."io.quarkiverse.mcp".level=DEBUG

%perf.quarkus.log.console.enabled=false

%perf.quarkus.log.handler.file.wanaku-log.enabled=true
%perf.quarkus.log.handler.file.wanaku-log.path=target/logs/wanaku.log
%perf.quarkus.log.handler.file.wanaku-log.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c] (%t) [traceId=%X{traceId}, requestId=%X{requestId}] %s%e%n
%perf.quarkus.log.category."ai.wanaku".handlers=wanaku-log
%perf.quarkus.log.category."ai.wanaku".level=DEBUG
%perf.quarkus.log.category."io.quarkus".handlers=wanaku-log
%perf.quarkus.log.category."io.quarkus".level=INFO
%perf.quarkus.log.category."org.apache.http".handlers=wanaku-log
%perf.quarkus.log.category."org.apache.http".level=INFO
%perf.quarkus.log.category."io.quarkus.oidc.proxy".handlers=wanaku-log
%perf.quarkus.log.category."io.quarkus.oidc.proxy".level=DEBUG
%perf.quarkus.log.category."io.quarkiverse.mcp".handlers=wanaku-log
%perf.quarkus.log.category."io.quarkiverse.mcp".level=DEBUG

%local.quarkus.log.console.enabled=false
%local.quarkus.log.file.enabled=true
%local.quarkus.log.file.path=${wanaku.home}/local/logs/wanaku-router.log
%local.quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c] (%t) [traceId=%X{traceId}, requestId=%X{requestId}] %s%e%n
%local.quarkus.log.category."ai.wanaku".level=DEBUG
%local.quarkus.log.category."io.quarkiverse.mcp".level=DEBUG

%test.quarkus.log.file.enabled=true
%test.quarkus.log.file.path=target/logs/wanaku.log
%test.quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c] (%t) [traceId=%X{traceId}, requestId=%X{requestId}] %s%e%n
%test.quarkus.log.category."org.apache.http".level=INFO

quarkus.qute.content-types.tpl=text/plain

quarkus.smallrye-openapi.store-schema-directory=src/main/webui/
quarkus.smallrye-openapi.auto-add-security=false
mp.openapi.scan.exclude.packages=ai.wanaku.backend.api.v1.oidc
