- route:
    description: Send and receive messages to and from RabbitMQ
    from:
      uri: direct
      parameters:
        name: wanaku
      steps:
        - log: ${body}
        - to:
            uri: spring-rabbitmq
            parameters:
              queues: "{{rabbitmq.queue}}"
              exchangeName: "{{rabbitmq.exchange}}"
              connectionFactory: "#rabbitConnectionFactory"
      id: from-rabbitmq
    id: rabbitmq-send
