tool.description=Chat with an AI agent that can reason, use tools, and maintain conversation memory

# Agent ID -- must match the bean name registered by Forage
agent.id=agent

# Model configuration (required)
agent.model.kind={{agent.model.kind}}
agent.model.name={{agent.model.name}}
agent.base.url={{agent.base.url}}
agent.api.key={{agent.api.key}}

# Optional features (comma-separated: memory)
agent.features=

# Memory configuration (only used when agent.features contains "memory")
agent.memory.kind=message-window
agent.memory.max.messages=20

# Model parameters
agent.temperature=0.7
agent.max.tokens=1024
