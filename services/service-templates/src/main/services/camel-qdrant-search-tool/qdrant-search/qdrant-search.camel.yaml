- route:
    id: qdrant-similarity-search
    description: Perform vectorized similarity search in Qdrant
    from:
      uri: direct:wanaku
      steps:
        - setHeader:
            name: CamelQdrantAction
            constant: "SIMILARITY_SEARCH"
        - setHeader:
            name: CamelQdrantWithPayload
            constant: "true"
        - to:
            uri: "qdrant:{{qdrant.collection}}"
            parameters:
              host: "{{qdrant.host}}"
              port: "{{qdrant.port}}"
              apiKey: "{{qdrant.api.key}}"
