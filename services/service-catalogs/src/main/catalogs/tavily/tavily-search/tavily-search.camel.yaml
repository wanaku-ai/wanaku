# Camel routes for tavily-search
- route:
    description: Search the web using the Tavily AI-optimized search engine
    from:
      uri: direct:wanaku
    steps:
      - to:
          uri: langchain4j-web-search:wanakuTavily
          parameters:
            webSearchEngine: "#web-search-engine"
            query.resultType: SNIPPET
            query.maxResults: 10
    id: tavily-search
